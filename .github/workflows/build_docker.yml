name: Build Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t iptv-builder:${{ github.event.inputs.image_tag }} .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          rm -rf docker-context || true
          mkdir -p docker-context
          rsync -a --delete --exclude '.git' --exclude '.venv' --exclude '.github' --exclude 'docker-context' ./ docker-context/

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context/
          file: docker-context/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/iptv:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/iptv:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
